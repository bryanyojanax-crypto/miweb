<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Votación Online 🗳️</title>

  <!-- Librería de gráficos -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(135deg, #74ebd5, #9face6);
    }

    .card {
      background: white;
      padding: 20px;
      margin: 50px auto;
      width: 320px;
      border-radius: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    button {
      margin: 10px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #4CAF50;
      color: white;
    }

    button:hover {
      background: #45a049;
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>🍎 Elige tu fruta favorita</h2>

    <div id="votacion">
      <button onclick="votar('Manzana')">🍎 Manzana</button>
      <button onclick="votar('Plátano')">🍌 Plátano</button>
      <button onclick="votar('Fresa')">🍓 Fresa</button>
    </div>

    <h3 id="mensaje"></h3>

    <button onclick="verResultados()">Ver resultados</button>

    <h3 id="resultado"></h3>

    <canvas id="grafico"></canvas>
  </div>

  <!-- 🔥 FIREBASE -->
  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAd2amUKd3n8V8bRZiiZsv5aVcENfw3XQE",
      authDomain: "votacion-web.firebaseapp.com",
      projectId: "votacion-web",
      storageBucket: "votacion-web.firebasestorage.app",
      messagingSenderId: "14988299286",
      appId: "1:14988299286:web:0dfe4e7c045c7a423ab937",
      measurementId: "G-5XW6HDV1WD"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 🔒 bloquear si ya votó
    if(localStorage.getItem("votoRealizado")) {
      document.getElementById("votacion").style.display = "none";
      document.getElementById("mensaje").innerText = "✅ Ya votaste 🙌";
    }

    // 🗳️ votar
    window.votar = async function(opcion) {

      if(localStorage.getItem("votoRealizado")) {
        alert("❌ Ya votaste");
        return;
      }

      await addDoc(collection(db, "votos"), {
        opcion: opcion,
        fecha: new Date()
      });

      localStorage.setItem("votoRealizado", "si");

      document.getElementById("votacion").style.display = "none";
      document.getElementById("mensaje").innerText =
        "🎉 Gracias por votar por " + opcion;
    }

    // 📊 resultados + gráfico
    window.verResultados = async function() {

      const querySnapshot = await getDocs(collection(db, "votos"));

      let manzana = 0;
      let platano = 0;
      let fresa = 0;

      querySnapshot.forEach((doc) => {
        let op = doc.data().opcion;
        if(op === "Manzana") manzana++;
        if(op === "Plátano") platano++;
        if(op === "Fresa") fresa++;
      });

      document.getElementById("resultado").innerHTML =
        "Resultados:<br>" +
        "🍎 " + manzana + "<br>" +
        "🍌 " + platano + "<br>" +
        "🍓 " + fresa;

      new Chart(document.getElementById("grafico"), {
        type: "bar",
        data: {
          labels: ["Manzana", "Plátano", "Fresa"],
          datasets: [{
            label: "Votos",
            data: [manzana, platano, fresa]
          }]
        }
      });
    }

  </script>

</body>
</html>
