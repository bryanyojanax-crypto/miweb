<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Votación Online 🗳️</title>
</head>
<body style="text-align:center; font-family: Arial;">

  <h1>🗳️ Vota por tu opción</h1>

  <button onclick="votar('A')">Opción A</button>
  <button onclick="votar('B')">Opción B</button>

  <br><br>

  <button onclick="verResultados()">Ver resultados</button>

  <h2 id="resultado"></h2>

  <!-- 🔥 FIREBASE COMPLETO -->
  <script type="module">

    // IMPORTS
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-analytics.js";
    import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    // TU CONFIG (ya puesta)
    const firebaseConfig = {
      apiKey: "AIzaSyAd2amUKd3n8V8bRZiiZsv5aVcENfw3XQE",
      authDomain: "votacion-web.firebaseapp.com",
      projectId: "votacion-web",
      storageBucket: "votacion-web.firebasestorage.app",
      messagingSenderId: "14988299286",
      appId: "1:14988299286:web:0dfe4e7c045c7a423ab937",
      measurementId: "G-5XW6HDV1WD"
    };

    // INICIAR FIREBASE
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getFirestore(app);

    // 🔥 GUARDAR VOTO
    window.votar = async function(opcion) {
      await addDoc(collection(db, "votos"), {
        opcion: opcion,
        fecha: new Date()
      });

      alert("✅ Voto registrado");
    }

    // 🔥 VER RESULTADOS
    window.verResultados = async function() {
      const querySnapshot = await getDocs(collection(db, "votos"));

      let a = 0;
      let b = 0;

      querySnapshot.forEach((doc) => {
        if(doc.data().opcion === "A") a++;
        if(doc.data().opcion === "B") b++;
      });

      document.getElementById("resultado").innerHTML =
        "Resultados:<br> A: " + a + " votos<br> B: " + b + " votos";
    }

  </script>

</body>
</html>
